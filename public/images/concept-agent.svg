<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="agentBg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F0FE"/>
      <stop offset="1" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="agentCore" x1="160" y1="100" x2="240" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4D6BFE"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#agentBg)"/>
  <!-- Central Agent -->
  <circle cx="200" cy="150" r="42" fill="url(#agentCore)"/>
  <circle cx="200" cy="150" r="42" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <text x="200" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Agent</text>
  <!-- Orbit rings -->
  <ellipse cx="200" cy="150" rx="80" ry="80" fill="none" stroke="#4D6BFE" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4"/>
  <ellipse cx="200" cy="150" rx="120" ry="120" fill="none" stroke="#4D6BFE" stroke-width="1.5" opacity="0.15" stroke-dasharray="4 4"/>
  <!-- Tool nodes -->
  <g>
    <circle cx="80" cy="80" r="22" fill="#FFFFFF" stroke="#4D6BFE" stroke-width="2"/>
    <text x="80" y="86" text-anchor="middle" font-size="20">🔧</text>
    <line x1="100" y1="95" x2="170" y2="135" stroke="#4D6BFE" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <circle cx="320" cy="80" r="22" fill="#FFFFFF" stroke="#4D6BFE" stroke-width="2"/>
    <text x="320" y="86" text-anchor="middle" font-size="20">📊</text>
    <line x1="300" y1="95" x2="230" y2="135" stroke="#4D6BFE" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <circle cx="80" cy="220" r="22" fill="#FFFFFF" stroke="#4D6BFE" stroke-width="2"/>
    <text x="80" y="226" text-anchor="middle" font-size="20">💾</text>
    <line x1="100" y1="205" x2="170" y2="165" stroke="#4D6BFE" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <circle cx="320" cy="220" r="22" fill="#FFFFFF" stroke="#4D6BFE" stroke-width="2"/>
    <text x="320" y="226" text-anchor="middle" font-size="20">🌐</text>
    <line x1="300" y1="205" x2="230" y2="165" stroke="#4D6BFE" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
