<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#flowBg)"/>
  <!-- Think step -->
  <circle cx="80" cy="80" r="28" fill="#F59E0B"/>
  <text x="80" y="86" text-anchor="middle" font-size="22">🤔</text>
  <text x="80" y="128" text-anchor="middle" font-size="12" fill="#92400E" font-weight="600">思考</text>
  <!-- Arrow -->
  <path d="M115 80 L165 80" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M160 75 L170 80 L160 85" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Act step -->
  <circle cx="200" cy="80" r="28" fill="#10B981"/>
  <text x="200" y="86" text-anchor="middle" font-size="22">⚡</text>
  <text x="200" y="128" text-anchor="middle" font-size="12" fill="#065F46" font-weight="600">行动</text>
  <!-- Arrow -->
  <path d="M235 80 L285 80" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M280 75 L290 80 L280 85" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Observe step -->
  <circle cx="320" cy="80" r="28" fill="#3B82F6"/>
  <text x="320" y="86" text-anchor="middle" font-size="22">👁</text>
  <text x="320" y="128" text-anchor="middle" font-size="12" fill="#1E40AF" font-weight="600">观察</text>
  <!-- Loop arrow back -->
  <path d="M320 115 Q320 200 200 200 Q80 200 80 115" stroke="#6B7280" stroke-width="2" stroke-linecap="round" fill="none" stroke-dasharray="5 5"/>
  <path d="M75 120 L80 110 L85 120" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="200" y="220" text-anchor="middle" font-size="12" fill="#4B5563" font-weight="600">循环迭代 · 持续优化</text>
  <text x="200" y="240" text-anchor="middle" font-size="10" fill="#6B7280">ReAct 模式：推理与行动交替进行</text>
</svg>
