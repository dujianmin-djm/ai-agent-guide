  </defs>
  <rect width="400" height="300" rx="20" fill="url(#promptBg)"/>
  <!-- Chat bubble -->
  <path d="M120 90 L280 90 C290 90 296 96 296 106 L296 170 C296 180 290 186 280 186 L200 186 L170 210 L170 186 L120 186 C110 186 104 180 104 170 L104 106 C104 96 110 90 120 90 Z" fill="url(#promptCore)"/>
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Prompt</text>
