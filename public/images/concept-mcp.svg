<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mcpBg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F8F5"/>
      <stop offset="1" stop-color="#D5F5EE"/>
    </linearGradient>
    <linearGradient id="mcpCore" x1="160" y1="100" x2="240" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#mcpBg)"/>
  <!-- Central MCP hub -->
  <rect x="160" y="120" width="80" height="60" rx="12" fill="url(#mcpCore)"/>
  <text x="200" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">MCP</text>
  <!-- Connection lines to data sources -->
  <line x1="160" y1="135" x2="90" y2="90" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="135" x2="310" y2="90" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="165" x2="90" y2="210" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="165" x2="310" y2="210" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <!-- Data source nodes -->
  <g>
    <rect x="50" y="70" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="90" y="97" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">苍穹系统</text>
  </g>
  <g>
    <rect x="270" y="70" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="310" y="97" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">数据库</text>
  </g>
  <g>
    <rect x="50" y="188" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="90" y="215" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">文档库</text>
  </g>
  <g>
    <rect x="270" y="188" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="310" y="215" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">API 服务</text>
  </g>
</svg>
