<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skillBg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4E6"/>
      <stop offset="1" stop-color="#FFEFD5"/>
    </linearGradient>
    <linearGradient id="skillCore" x1="160" y1="100" x2="240" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#skillBg)"/>
  <!-- Toolbox -->
  <rect x="140" y="110" width="120" height="90" rx="12" fill="url(#skillCore)"/>
  <rect x="140" y="110" width="120" height="90" rx="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <rect x="180" y="100" width="40" height="16" rx="4" fill="url(#skillCore)"/>
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Skill</text>
  <!-- Skill modules floating around -->
  <g>
    <rect x="50" y="70" width="60" height="40" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="80" y="95" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">建模</text>
    <line x1="110" y1="100" x2="140" y2="130" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <rect x="290" y="70" width="60" height="40" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="320" y="95" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">插件</text>
    <line x1="290" y1="100" x2="260" y2="130" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <rect x="50" y="200" width="60" height="40" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="80" y="225" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">UI</text>
    <line x1="110" y1="210" x2="140" y2="180" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  </g>
  <g>
    <rect x="290" y="200" width="60" height="40" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="320" y="225" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">API</text>
    <line x1="290" y1="210" x2="260" y2="180" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
